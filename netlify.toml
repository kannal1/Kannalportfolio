# Netlify configuration for the Kannal Umayan portfolio
# Static HTML site - no build step needed.

[build]
  publish = "."
  command = ""

# Pretty URLs: /creb instead of /creb.html
[[redirects]]
  from = "/creb"
  to = "/creb.html"
  status = 200
[[redirects]]
  from = "/cgb"
  to = "/cgb.html"
  status = 200
[[redirects]]
  from = "/3eco"
  to = "/3eco.html"
  status = 200
[[redirects]]
  from = "/ola"
  to = "/ola.html"
  status = 200
[[redirects]]
  from = "/play"
  to = "/play.html"
  status = 200
[[redirects]]
  from = "/resume"
  to = "/resume.html"
  status = 200

# Cache static assets aggressively, HTML lightly
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
